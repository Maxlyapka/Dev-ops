# ==============================================================================
# Configuration: sshd_config (Security Hardening Snippet)
# Description: Custom SSH configuration applied to all nodes 
# Author: Maksym Romanov
# ==============================================================================

# Changed default port to prevent automated brute-force attacks
# Reference: Section 1.5 of the project report
Port 2222

# Disabled password authentication, strictly requiring ed25519 SSH keys
# Reference: Section 1.3 of the project report
PasswordAuthentication no
PubkeyAuthentication yes

# Restricted root login (Recommended: prohibit-password for key-only access)
PermitRootLogin prohibit-password
