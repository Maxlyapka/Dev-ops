# Nginx Load Balancer & Reverse Proxy Configuration
# Distributes traffic between two Apache backend nodes

upstream apache_cluster {
    server 172.27.x.124:80; # Backend Node 1
    server 172.27.x.125:80; # Backend Node 2
}

server {
    listen 80;
    server_name apache.project-domain.com;

    location / {
        proxy_pass http://apache_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# PHP-FPM Configuration for local processing
server {
    listen 80;
    server_name fpm.project-domain.com;
    root /var/www/fpm_site;
    index index.php;

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }
}
