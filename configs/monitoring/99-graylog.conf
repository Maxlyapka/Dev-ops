# ==============================================================================
# Configuration: 99-graylog.conf
# Description: Rsyslog configuration to forward system logs to Graylog
# Author: Maksym Romanov
# ==============================================================================

# Forward all standard syslog messages to Graylog via UDP (port 1514)
# Using RSYSLOG_SyslogProtocol23Format for structured data parsing
*.* @172.27.27.121:1514;RSYSLOG_SyslogProtocol23Format

# Optional: Monitor specific Apache application logs
$ModLoad imfile
$InputFileName /var/log/apache2/access.log
$InputFileTag apache-access:
$InputFileStateFile stat-apache-access
$InputFileSeverity info
$InputFileFacility local6
$InputRunFileMonitor
