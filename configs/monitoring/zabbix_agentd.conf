# ==============================================================================
# Configuration: zabbix_agentd.conf (Snippet)
# Description: Zabbix Agent configuration for monitoring backend nodes
# Author: Maksym Romanov
# ==============================================================================

# IP address of the Zabbix server to which the agent will send data
Server=172.27.27.121

# IP address of the Zabbix server for active checks
ServerActive=172.27.27.121

# Automatically get the hostname of the server
HostnameItem=system.hostname

# Allow remote commands from Zabbix server (useful for auto-remediation)
EnableRemoteCommands=1

# Log file for the Zabbix agent
LogFile=/var/log/zabbix/zabbix_agentd.log
