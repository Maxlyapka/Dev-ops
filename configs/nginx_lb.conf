# ==============================================================================
# Configuration: nginx-lb.conf
# Description: Nginx Load Balancer & Reverse Proxy for Apache Backend Cluster
# Author: Maksym Romanov
# ==============================================================================

# 1. Define the upstream cluster (Apache backend nodes)
upstream apache_cluster {
    # Round-robin load balancing by default
    server 172.27.27.124:80; # Node 1 (Backend)
    server 172.27.27.125:80; # Node 2 (Backend)
    
    # Optional: you can add weight or max_fails here in the future
    # server 172.27.27.124:80 weight=2 max_fails=3 fail_timeout=30s;
}

# 2. HTTP Server - Redirect to HTTPS
server {
    listen 80;
    server_name ____________;

    # Redirect all HTTP traffic to HTTPS for security
    return 301 https://$host$request_uri;
}

# 3. HTTPS Server - Load Balancer
server {
    listen 443 ssl;
    server_name _____________;

    # SSL Configuration (Paths to your self-signed certificates)
    ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

    # Basic Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Access and Error Logs
    access_log /var/log/nginx/lb_access.log;
    error_log /var/log/nginx/lb_error.log warn;

    # Proxy settings to route traffic to the upstream cluster
    location / {
        proxy_pass http://apache_cluster;
        
        # Pass real client IP and headers to the backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Proxy timeouts to prevent hanging connections
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
