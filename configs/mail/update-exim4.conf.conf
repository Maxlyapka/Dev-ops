# ==============================================================================
# Configuration: exim4 (MTA) - update-exim4.conf.conf
# Description: Mail server configuration (Internet Site mode)
# Author: Maksym Romanov
# Reference: Page 63 of the project report (Additional Task)
# ==============================================================================

# General configuration type: Internet Site (Direct delivery via SMTP)
dc_eximconfig_configtype='internet'

# Other hostnames to accept mail for (Empty by default)
dc_other_hostnames=''

# Local interfaces to listen on (Restricted to localhost for security)
dc_local_interfaces='127.0.0.1 ; ::1'

# Read host (Not used in 'internet' mode)
dc_readhost=''

# Relay settings (Closed relay for security)
dc_relay_domains=''
dc_relay_nets=''

# Smarthost (Empty, as delivery is direct)
dc_smarthost=''

# Local delivery method
dc_localdelivery='mail_spool'

# Configuration file format
dc_use_split_config='false'

# Outgoing mail settings
dc_hide_mailname=''
dc_mailname_in_oh='true'

# DNS behavior
dc_minimaldns='false'
